name: stock-data-sync

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-stock_data_sync}
      POSTGRES_USER: ${POSTGRES_USER:-stock_sync}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stock_sync}
      TZ: Asia/Shanghai
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-stock_sync} -d ${POSTGRES_DB:-stock_data_sync}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  postgres_data:
